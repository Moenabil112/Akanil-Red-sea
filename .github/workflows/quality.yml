name: Quality

# Runs the repository's quality gates. No deployment, secrets or analytics.
# The public build never requires a database; P4-A integration tests use a
# throwaway PostgreSQL service with synthetic credentials (not repository secret contexts).
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    # Ephemeral PostgreSQL for P4-A integration tests only. Synthetic
    # credentials defined inline — never production credentials.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: akanil_p4
          POSTGRES_PASSWORD: ci_synthetic_only
          POSTGRES_DB: akanil_p4_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U akanil_p4 -d akanil_p4_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Synthetic CI values only. The public build ignores these; the
      # internal system stays disabled unless P4_INTERNAL_ENABLED=true.
      DATABASE_URL: postgresql://akanil_p4:ci_synthetic_only@localhost:5432/akanil_p4_test?schema=public
      DATABASE_URL_TEST: postgresql://akanil_p4:ci_synthetic_only@localhost:5432/akanil_p4_test?schema=public
      AUTH_SECRET: ci_synthetic_secret_not_for_production_use_only
      P4_INTERNAL_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply test migrations
        run: npm run db:migrate:test

      - name: Typecheck
        run: npm run typecheck

      - name: Test (unit + component)
        run: npm test

      - name: Test (integration, PostgreSQL)
        run: npm run test:integration

      - name: Build (public build succeeds without a database)
        run: npm run build

      - name: Lint
        run: npm run lint

      # ---- P4-B controlled security checks (no deployment, no cloud secrets) ----

      - name: Audit hash-chain tests
        run: npm run internal:audit:test

      - name: Backup-and-restore smoke (synthetic)
        run: npm run internal:backup:smoke

      - name: Audit hash-chain verification (test database)
        run: npm run internal:audit:verify

      - name: Migration drift / status
        run: npx prisma migrate status
        continue-on-error: true

      - name: Committed-secret scan
        run: |
          echo "Scanning tracked files for obviously-committed secrets…"
          # Fail if a real .env is tracked, or a private key / high-entropy secret assignment lands in source.
          if git ls-files | grep -E '^\.env$|^\.env\.(local|production)$'; then
            echo "A real .env file is tracked."; exit 1
          fi
          if git grep -nE 'BEGIN (RSA|OPENSSH|EC|PGP) PRIVATE KEY' -- . ':!*.md'; then
            echo "A private key appears to be committed."; exit 1
          fi
          # Placeholder values in .env.example / docker-compose are allowed; real-looking AUTH_SECRET values are not.
          if git grep -nE 'AUTH_SECRET\s*[:=]\s*["'\'']?[A-Za-z0-9+/]{40,}' -- . ':!*.md' ':!.env.example'; then
            echo "A real-looking AUTH_SECRET value appears to be committed."; exit 1
          fi
          echo "No committed secrets detected."

      - name: Dependency vulnerability audit (high/critical)
        run: npm audit --audit-level=high
        continue-on-error: true
